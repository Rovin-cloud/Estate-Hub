openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Real Estate CRM API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: leads
    description: Lead management
  - name: customers
    description: Customer management
  - name: properties
    description: Property management
  - name: tasks
    description: Task management
  - name: dashboard
    description: Dashboard analytics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Dashboard ─────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/pipeline:
    get:
      operationId: getPipelineBreakdown
      tags: [dashboard]
      summary: Get lead counts by pipeline stage
      responses:
        "200":
          description: Pipeline breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PipelineStage"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # ── Leads ─────────────────────────────────────────────────────────────
  /leads:
    get:
      operationId: getLeads
      tags: [leads]
      summary: List all leads
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: source
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: assignedTo
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"
    post:
      operationId: createLead
      tags: [leads]
      summary: Create a new lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /leads/{id}:
    get:
      operationId: getLead
      tags: [leads]
      summary: Get a lead by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "404":
          description: Not found
    patch:
      operationId: updateLead
      tags: [leads]
      summary: Update a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadUpdate"
      responses:
        "200":
          description: Updated lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
    delete:
      operationId: deleteLead
      tags: [leads]
      summary: Delete a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Customers ─────────────────────────────────────────────────────────
  /customers:
    get:
      operationId: getCustomers
      tags: [customers]
      summary: List all customers
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get a customer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found
    patch:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Properties ────────────────────────────────────────────────────────
  /properties:
    get:
      operationId: getProperties
      tags: [properties]
      summary: List all properties
      parameters:
        - name: availability
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of properties
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Property"
    post:
      operationId: createProperty
      tags: [properties]
      summary: Create a property
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PropertyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Property"

  /properties/{id}:
    get:
      operationId: getProperty
      tags: [properties]
      summary: Get a property by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Property
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Property"
        "404":
          description: Not found
    patch:
      operationId: updateProperty
      tags: [properties]
      summary: Update a property
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PropertyUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Property"
    delete:
      operationId: deleteProperty
      tags: [properties]
      summary: Delete a property
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Tasks ─────────────────────────────────────────────────────────────
  /tasks:
    get:
      operationId: getTasks
      tags: [tasks]
      summary: List all tasks
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: leadId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get a task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Not found
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── Dashboard ──────────────────────────────────────────────────────
    DashboardSummary:
      type: object
      required: [totalLeads, newLeads, hotLeads, siteVisits, bookings, soldThisMonth]
      properties:
        totalLeads:
          type: integer
        newLeads:
          type: integer
        hotLeads:
          type: integer
        siteVisits:
          type: integer
        bookings:
          type: integer
        soldThisMonth:
          type: integer

    PipelineStage:
      type: object
      required: [stage, count]
      properties:
        stage:
          type: string
        count:
          type: integer

    ActivityItem:
      type: object
      required: [id, type, description, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
        description:
          type: string
        createdAt:
          type: string

    # ── Lead ──────────────────────────────────────────────────────────
    Lead:
      type: object
      required: [id, name, phone, source, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        source:
          type: string
        status:
          type: string
        assignedTo:
          type: ["string", "null"]
        followUpDate:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        propertyId:
          type: ["integer", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    LeadInput:
      type: object
      required: [name, phone, source, status]
      properties:
        name:
          type: string
        phone:
          type: string
        source:
          type: string
          enum: [Facebook, Website, WhatsApp, Walk-in, Referral]
        status:
          type: string
          enum: [New, Contacted, Interested, Site Visit, Negotiation, Booking, Sold]
        assignedTo:
          type: string
        followUpDate:
          type: string
        notes:
          type: string
        propertyId:
          type: integer

    LeadUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        source:
          type: string
        status:
          type: string
        assignedTo:
          type: string
        followUpDate:
          type: string
        notes:
          type: string
        propertyId:
          type: integer

    # ── Customer ──────────────────────────────────────────────────────
    Customer:
      type: object
      required: [id, name, phone, email, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: ["string", "null"]
        nid:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    CustomerInput:
      type: object
      required: [name, phone, email]
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        nid:
          type: string
        notes:
          type: string

    CustomerUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        nid:
          type: string
        notes:
          type: string

    # ── Property ──────────────────────────────────────────────────────
    Property:
      type: object
      required: [id, projectName, location, unitNumber, price, availability, createdAt]
      properties:
        id:
          type: integer
        projectName:
          type: string
        location:
          type: string
        unitNumber:
          type: string
        price:
          type: number
        availability:
          type: string
        description:
          type: ["string", "null"]
        floorPlan:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    PropertyInput:
      type: object
      required: [projectName, location, unitNumber, price, availability]
      properties:
        projectName:
          type: string
        location:
          type: string
        unitNumber:
          type: string
        price:
          type: number
        availability:
          type: string
          enum: [Available, Reserved, Sold]
        description:
          type: string
        floorPlan:
          type: string

    PropertyUpdate:
      type: object
      properties:
        projectName:
          type: string
        location:
          type: string
        unitNumber:
          type: string
        price:
          type: number
        availability:
          type: string
        description:
          type: string
        floorPlan:
          type: string

    # ── Task ──────────────────────────────────────────────────────────
    Task:
      type: object
      required: [id, title, status, dueDate, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        status:
          type: string
        dueDate:
          type: string
        leadId:
          type: ["integer", "null"]
        leadName:
          type: ["string", "null"]
        assignedTo:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    TaskInput:
      type: object
      required: [title, status, dueDate]
      properties:
        title:
          type: string
        status:
          type: string
          enum: [Pending, In Progress, Done]
        dueDate:
          type: string
        leadId:
          type: integer
        assignedTo:
          type: string
        notes:
          type: string

    TaskUpdate:
      type: object
      properties:
        title:
          type: string
        status:
          type: string
        dueDate:
          type: string
        leadId:
          type: integer
        assignedTo:
          type: string
        notes:
          type: string
